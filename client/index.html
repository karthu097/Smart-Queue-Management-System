<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue | Premium Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="logo">
            <span class="icon">⚡</span>
            <h1>SmartQueue</h1>
        </div>
        <nav>
            <button id="nav-user" class="nav-btn active">User Dashboard</button>
            <button id="nav-admin" class="nav-btn">Admin Portal</button>
        </nav>
    </header>

    <main id="app">
        <!-- User View -->
        <section id="user-view" class="view active">
            <div class="card glass">
                <div class="card-header">
                    <h2>Join the Virtual Queue</h2>
                    <p>Track your wait time in real-time without standing in line.</p>
                </div>
                
                <div id="join-form" class="form-container">
                    <div class="input-group">
                        <label for="username">Your Full Name</label>
                        <input type="text" id="username" placeholder="Enter your name..." autocomplete="off">
                    </div>
                    <button id="join-btn" class="primary-btn">Join Queue</button>
                </div>

                <div id="status-card" class="status-panel hidden">
                    <div class="status-header">
                        <div class="user-badge">
                            <span id="display-name">John Doe</span>
                        </div>
                        <div id="near-turn-alert" class="alert hidden">
                            <span class="pulse"></span>
                            Your turn is coming soon!
                        </div>
                    </div>
                    
                    <div class="metrics">
                        <div class="metric">
                            <span class="label">Position</span>
                            <span id="pos-val" class="value">0</span>
                        </div>
                        <div class="divider"></div>
                        <div class="metric">
                            <span class="label">Wait Time</span>
                            <span id="time-val" class="value">0</span>
                            <span class="unit">min</span>
                        </div>
                    </div>

                    <div class="status-footer">
                        <div class="live-indicator">
                            <span class="dot"></span>
                            Live Updates
                        </div>
                        <button id="leave-btn" class="text-btn">Leave Queue</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Admin View -->
        <section id="admin-view" class="view">
            <div class="admin-grid">
                <div class="card glass settings-card">
                    <div class="card-header">
                        <h3>Service Settings</h3>
                    </div>
                    <div class="input-group">
                        <label for="avg-time-input">Avg Service Time (mins)</label>
                        <input type="number" id="avg-time-input" value="5" min="1">
                    </div>
                    <button id="update-settings-btn" class="secondary-btn">Save Changes</button>
                </div>

                <div class="card glass queue-list-card">
                    <div class="card-header">
                        <h3>Current Queue</h3>
                        <span id="queue-count" class="count-badge">0 People</span>
                    </div>
                    <div class="queue-table-container">
                        <table id="queue-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="queue-body">
                                <!-- Dynamic items here -->
                            </tbody>
                        </table>
                        <div id="empty-state" class="empty-state">
                            <p>No one is in the queue yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>
</html>
